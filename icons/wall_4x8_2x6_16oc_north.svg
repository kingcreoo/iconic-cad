<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <mask id="ring-mask">
      <rect width="64" height="64" fill="black"/>
      <rect x="6" y="6" width="52" height="52" rx="10" ry="10" fill="white"/>
      <rect x="11" y="11" width="42" height="42" rx="8" ry="8" fill="black"/>
    </mask>
    <clipPath id="north-clip">
      <rect x="0" y="0" width="64" height="16"/>
    </clipPath>
  </defs>

  <!-- Darkened north side -->
  <rect width="64" height="64" fill="black" mask="url(#ring-mask)" clip-path="url(#north-clip)"/>

  <!-- Double border -->
  <rect x="6" y="6" width="52" height="52" rx="10" ry="10" fill="none" stroke="black" stroke-width="0.75"/>
  <rect x="11" y="11" width="42" height="42" rx="8" ry="8" fill="none" stroke="black" stroke-width="0.75"/>

  <!-- Wall visual (frame + center studs) -->
  <rect x="24" y="18" width="16" height="14" rx="2" fill="none" stroke="black" stroke-width="2"/>
  <rect x="28.5" y="18" width="2" height="14" fill="black"/>
  <rect x="33.5" y="18" width="2" height="14" fill="black"/>

  <!-- Module height (left of wall icon) -->
  <text x="19" y="27" text-anchor="middle" font-family="sans-serif" font-size="5" font-weight="bold" fill="black">8'</text>

  <!-- Module width (right of wall icon) -->
  <text x="47" y="27" text-anchor="middle" font-family="sans-serif" font-size="4" font-weight="bold" fill="black">48"</text>

  <!-- Lumber type (bottom left) -->
  <text x="24" y="44" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="black">2x6</text>

  <!-- OC spacing with circle (bottom right) -->
  <circle cx="40" cy="41" r="5" fill="none" stroke="black" stroke-width="1"/>
  <text x="40" y="43" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="black">16</text>
  <text x="46" y="40" text-anchor="start" font-family="sans-serif" font-size="5" font-weight="bold" fill="black">C</text>
</svg>
